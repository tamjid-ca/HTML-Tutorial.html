<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <title>Text Formatting Demo</title>

        <!-- external css -->
        <!-- <link rel="stylesheet" href="index.css"> -->

        <!-- internal css -->
        <style>
            body {
                font-family: Arial, sans-serif;
                margin: 2rem;
                background: #f8f8f8;
            }
            p {
                margin: 0.6rem 0;
                color: #333;
            }
            p#p1 {
                color: blue;
            }
            mark {
                background-color: #ffec99;
            }
        </style>
    </head>
<body>

        <!-- The <b> element makes text look bold without adding meaning. -->
        <p id="p1">This is <b>bold</b> text.</p>

        <!-- The <strong> element shows text that is important. -->
        <p>This is <strong>important</strong> text.</p>

        <!-- The <i> element tilts text for a different voice or mood. -->
        <p>This is <i>slanted</i> text.</p>

        <!-- The <em> element stresses a word when reading. -->
        <p>This is <em>emphasized</em> text.</p>

        <!-- The <mark> element highlights text like a marker. -->
        <p>This is a <mark>highlighted</mark> word.</p>

        <!-- The <small> element shows smaller side notes. -->
        <p>Read this <small>tiny</small> note.</p>

        <!-- The <del> element shows words that were removed. -->
        <p>I like <del>cats</del> dogs.</p>

        <!-- The <ins> element shows new words that were added. -->
        <p>I like <ins>friendly</ins> dogs.</p>

        <!-- The <sub> element drops text below the line. -->
        <p>Water is H<sub>2</sub>O.</p>

        <!-- The <sup> element lifts text above the line. -->
        <p style="color: red;">Seven squared is 7<sup>2</sup>.</p>
        <!-- inline css -->
</body>
</html>
