<!DOCTYPE html>
<html>
  <head>
    <title>List</title>
  </head>
  <body>

    <!-- unordered list -->
    <ul>
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
    </ul>


    <br /> <br /> <br />

    <!-- ordered list -->
    <ol>
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
    </ol>

    <br /> <br /> <br />

    <!-- description list -->
    <dl>
      <dt>Term 1</dt>
      <dd>Description 1</dd>
      <dt>Term 2</dt>
      <dd>Description 2</dd>
    </dl>

    <br /> <br /> <br />
    


  </body>
</html>
